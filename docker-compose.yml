version: '3.8'

services:
  simulador-can:
    build: .
    image: test-vhal-automotive:latest
    container_name: simulador_vhal_automotive
    environment:
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037
    network_mode: "host"
    # Cambia el comando para ejecutar las pruebas de telemática
    command: python -m unittest 05_Telematics_Calls/test_calls.py




